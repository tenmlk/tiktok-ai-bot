name: Telegram Bot Poll

on:
  schedule:
    # Run every 5 minutes (cron: min hour day month weekday)
    # NOTE: GitHub Actions cron can be delayed up to 15-30 min during high load.
    # This is the most frequent allowed schedule.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: read

concurrency:
  group: bot-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd username-bot
          npm install --no-audit --no-fund --omit=dev

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          cd username-bot
          node bot-once.js
